<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EyeScroll</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        EyeScroll
      </h1>
      <div id="connection-status">
        <span id="status-dot"></span>
        <span id="status-text">Connecting...</span>
      </div>
    </header>

    <main>
      <!-- Left column: Visualization -->
      <section id="gaze-viz">
        <h2>Gaze Tracking</h2>
        <div class="screen-preview">
          <div class="zone zone-up">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 19V5M5 12l7-7 7 7"/>
            </svg>
            Scroll Up
          </div>
          <div class="zone zone-reading">Reading Zone</div>
          <div class="zone zone-down">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12l7 7 7-7"/>
            </svg>
            Scroll Down
          </div>
          <div class="gaze-indicator" id="gaze-dot" data-zone="Reading" tabindex="0"></div>
        </div>
        <div class="gaze-data">
          <p>Iris Y <span id="iris-y-val">--</span></p>
          <p>Screen Y <span id="screen-y">--</span></p>
          <p>State <span id="state">--</span></p>
          <p>Calibrated <span id="calibrated-status">No</span></p>
        </div>
      </section>

      <!-- Right column: Controls -->
      <section id="controls">
        <h2>Settings</h2>

        <div class="control-group">
          <h3>Scroll Down</h3>
          <label class="checkbox-label">
            <input type="checkbox" id="enable-down" checked>
            Enable
          </label>
          <div class="slider-group">
            <div class="slider-header">
              <span>Dwell Time</span>
              <span id="dwell-value">500ms</span>
            </div>
            <input type="range" id="dwell-time" min="200" max="1500" value="500" step="50">
          </div>
          <div class="slider-group">
            <div class="slider-header">
              <span>Zone Size</span>
              <span id="zone-ratio-value">20%</span>
            </div>
            <input type="range" id="zone-ratio" min="10" max="40" value="20" step="1">
          </div>
        </div>

        <div class="control-group">
          <h3>Scroll Up</h3>
          <label class="checkbox-label">
            <input type="checkbox" id="enable-up" checked>
            Enable
          </label>
          <div class="slider-group">
            <div class="slider-header">
              <span>Dwell Time</span>
              <span id="up-dwell-value">800ms</span>
            </div>
            <input type="range" id="up-dwell-time" min="300" max="2000" value="800" step="50">
          </div>
          <div class="slider-group">
            <div class="slider-header">
              <span>Zone Size</span>
              <span id="up-zone-ratio-value">10%</span>
            </div>
            <input type="range" id="up-zone-ratio" min="5" max="30" value="10" step="1">
          </div>
        </div>
      </section>

      <!-- Calibration -->
      <section id="calibration">
        <h2>Calibration</h2>
        <div class="calibration-row">
          <button id="calibrate-top" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 19V5M5 12l7-7 7 7"/>
            </svg>
            Look Up
          </button>
          <button id="calibrate-bottom" class="btn btn-secondary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12l7 7 7-7"/>
            </svg>
            Look Down
          </button>
        </div>
        <p id="calibration-status"></p>
        <div class="calibration-actions">
          <button id="save-calibration" class="btn btn-small">
            Save
          </button>
          <button id="reset-calibration" class="btn btn-small btn-danger">
            Reset
          </button>
        </div>
      </section>

      <!-- Confirm Dialog -->
      <div id="confirm-dialog" class="dialog hidden">
        <div class="dialog-content">
          <p id="confirm-message"></p>
          <div class="dialog-actions">
            <button id="confirm-yes" class="btn btn-primary">Confirm</button>
            <button id="confirm-no" class="btn btn-secondary">Retry</button>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <p>EyeScroll v0.1.0</p>
    </footer>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
